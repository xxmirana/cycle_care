<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка цикла - Hello Kitty Cycle Care</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-512.png">
    <meta name="theme-color" content="#ffb6c1">
</head>
<body>
<div class="setup-wrapper">
    <div class="setup-container">
        <h2>📅 Настройка цикла</h2>
        <p>Введи данные о цикле твоей Китти:</p>
        <div class="form-group">
            <label>📆 Дата начала последних месячных:</label>
            <input type="date" id="setup-lastPeriod" class="setup-input">
        </div>
        <div class="form-group">
            <label>📊 Средняя длина цикла (дни):</label>
            <input type="number" id="setup-cycleLength" value="28" min="21" max="35" class="setup-input">
        </div>
        <button onclick="saveCycleData()" class="setup-btn">Сохранить и продолжить</button>
        <div id="error-message" class="error-message" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:8081';
    let currentUser = null;
    const errorDiv = document.getElementById('error-message');

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
    }

    async function checkUserAndCycle() {
        const userId = localStorage.getItem('userId');
        if (!userId) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = { id: parseInt(userId), username: localStorage.getItem('username') };

        try {
            const response = await fetch(`${API_BASE_URL}/api/cycle/phase/${currentUser.id}`);
            if (response.ok) {
                window.location.href = 'dashboard.html';
            }
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }

    async function saveCycleData() {
        const date = document.getElementById('setup-lastPeriod').value;
        const length = document.getElementById('setup-cycleLength').value;

        if (!date) {
            showError('Выбери дату начала цикла');
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/api/cycle/start?userId=${currentUser.id}&date=${date}&length=${length}`, {
                method: 'POST'
            });

            if (response.ok) {
                window.location.href = 'dashboard.html';
            } else {
                showError('Ошибка при сохранении данных');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            showError('Не удалось подключиться к серверу');
        }
    }

    window.onload = function() {
        checkUserAndCycle();
    };
</script>
</body>
</html>
